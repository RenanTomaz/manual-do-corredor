<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador | Manual do Corredor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #ff5500;
            --primary-hover: #e04b00;
            --dark: #0f1115;
            --dark-surface: #161920;
            --light-bg: #f4f6f9;
            --white: #ffffff;
            --border-color: #cbd5e1;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--light-bg); padding: 40px 20px; color: var(--dark); margin: 0; }
        .dashboard { max-width: 900px; margin: 0 auto; background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(15,17,21,0.05); border: 1px solid #e2e8f0; }
        
        h1 { font-family: 'Space Grotesk', sans-serif; text-align: center; margin-bottom: 35px; font-size: 28px; color: var(--dark); font-weight: 700; text-transform: uppercase; letter-spacing: -0.5px; }
        h1 span { color: var(--primary); font-style: italic; }
        
        /* Sistema de Abas */
        .tabs-nav { display: flex; gap: 8px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; background: #f1f5f9; border: none; font-size: 11px; font-weight: 700; text-transform: uppercase; border-radius: 6px; cursor: pointer; color: #475569; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; min-width: 160px; }
        .tab-btn:hover { background: #e2e8f0; color: var(--dark); }
        .tab-btn.active { background: var(--primary); color: var(--white); }
        
        /* Formulários Dinâmicos */
        .form-container { background: #f8fafc; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 40px; }
        .form-container h3 { font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; margin-bottom: 20px; font-size: 16px; color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 5px; display: inline-block; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        
        label { font-weight: 700; display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; color: #475569; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-size: 14px; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; }
        textarea { height: 80px; resize: none; }
        
        .form-actions { margin-top: 20px; display: flex; gap: 10px; }
        .btn-submit { background: var(--dark); color: #fff; border: none; padding: 14px 24px; font-size: 13px; font-weight: 700; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: 0.2s; flex: 2; }
        .btn-submit:hover { background: var(--primary); }
        .btn-cancel { background: #cbd5e1; color: #475569; border: none; padding: 14px 20px; font-size: 13px; font-weight: 700; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: 0.2s; flex: 1; display: none; }

        /* Listagem de Itens Gerenciáveis */
        .items-list { margin-top: 20px; }
        .item-row { background: var(--white); border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .item-row:hover { border-color: #94a3b8; background: #fafbfc; }
        .item-info h4 { margin: 0 0 4px 0; font-size: 15px; font-weight: 700; }
        .item-info p { margin: 0; font-size: 12px; color: #64748b; }
        
        .item-actions { display: flex; gap: 8px; }
        .btn-edit { background: #e2e8f0; color: #1e293b; border: none; width: 36px; height: 36px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-edit:hover { background: var(--dark); color: white; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; width: 36px; height: 36px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-delete:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Painel Geral do <span>Administrador</span></h1>
        
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="alterarSecao('novidades', this)"><i class="fas fa-bolt"></i> Novidades</button>
            <button class="tab-btn" onclick="alterarSecao('comparativos', this)"><i class="fas fa-columns"></i> Comparativos</button>
            <button class="tab-btn" onclick="alterarSecao('dicas', this)"><i class="fas fa-brain"></i> Dicas & Artigos</button>
            <button class="tab-btn" onclick="alterarSecao('corridas', this)"><i class="fas fa-calendar-alt"></i> Próximas Corridas</button>
        </div>
        
        <div class="form-container">
            <h3 id="form-titulo">Adicionar Item</h3>
            <form id="form-gerenciador" onsubmit="salvarItem(event)">
                <input type="hidden" id="item-id">
                
                <div class="grid-form" id="campos-dinamicos">
                    </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit">Salvar no Supabase</button>
                    <button type="button" class="btn-cancel" id="btn-cancelar" onclick="resetForm()">Cancelar Edição</button>
                </div>
            </form>
        </div>

        <div class="items-list">
            <h3 style="font-family:'Space Grotesk', sans-serif; text-transform:uppercase; font-size:14px; margin-bottom:15px; color:#475569;">Conteúdos Sincronizados na Nuvem</h3>
            <div id="lista-conteudos"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DE CREDENCIAIS DO SUPABASE ---
        const SUPABASE_URL = "https://pdyjjugutyxvppljqyiy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeWpqdWd1dHl4dnBwbGpxeWl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTIyODYsImV4cCI6MjA5NDU4ODI4Nn0.NXGuS6Tmw64vdv0iBzwFw87FyZ-Fx-o9UhG1Fy36J70";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let secaoAtiva = 'novidades';
        let dadosLocais = [];

        // Mapeamento dos campos necessários por tabela (Ajustado seções de corridas)
        const configuracaoCampos = {
            novidades: `
                <div><label>Tag / Categoria</label><input type="text" id="tag" required placeholder="Ex: Pista & Asfalto"></div>
                <div><label>Título do Lançamento</label><input type="text" id="titulo" required placeholder="Ex: Olympikus Corre 4"></div>
                <div class="full-width"><label>URL da Imagem</label><input type="url" id="imagem" required></div>
                <div class="full-width"><label>Link do Card (Review Computado)</label><input type="text" id="link" required placeholder="Ex: reviews/olympikus-corre-4.html"></div>
                <div class="full-width"><label>Resumo Técnico</label><textarea id="resumo" required></textarea></div>`,
            comparativos: `
                <div><label>Modelo Principal (A)</label><input type="text" id="modeloA" required placeholder="Ex: Nike Pegasus 40"></div>
                <div><label>Concorrente Direto (B)</label><input type="text" id="modeloB" required placeholder="Ex: Asics Novablast 4"></div>
                <div class="full-width"><label>Confronto de Objetivo</label><input type="text" id="confronto" required placeholder="Ex: Versatilidade vs Amortecimento"></div>
                <div class="full-width"><label>Veredito Manual</label><input type="text" id="veredito" required placeholder="Ex: Asics vence pelo conforto"></div>
                <div class="full-width"><label>Link de Afiliado (Onde Comprar)</label><input type="url" id="link" required></div>`,
            dicas: `
                <div><label>Tag / Categoria</label><input type="text" id="tag" required placeholder="Ex: Fisiologia"></div>
                <div><label>Título do Artigo</label><input type="text" id="titulo" required placeholder="Ex: Guia de Canelite"></div>
                <div class="full-width"><label>URL da Imagem</label><input type="url" id="imagem" required></div>
                <div class="full-width"><label>Link do Card (Artigo Completo)</label><input type="text" id="link" required placeholder="Ex: artigos/como-evitar-canelite.html"></div>
                <div class="full-width"><label>Resumo Educativo</label><textarea id="resumo" required></textarea></div>`,
            corridas: `
                <div><label>Data da Largada</label><input type="text" id="data" required placeholder="Ex: 14/06/2026"></div>
                <div><label>Nome do Evento / Prova</label><input type="text" id="evento" required placeholder="Ex: Maratona do Rio 2026"></div>
                <div><label>Cidade</label><input type="text" id="cidade" required placeholder="Ex: Rio de Janeiro"></div>
                <div>
                    <label>Estado (UF)</label>
                    <select id="estado" required>
                        <option value="">Selecione...</option>
                        <option value="AC">Acre (AC)</option>
                        <option value="AL">Alagoas (AL)</option>
                        <option value="AP">Amapá (AP)</option>
                        <option value="AM">Amazonas (AM)</option>
                        <option value="BA">Bahia (BA)</option>
                        <option value="CE">Ceará (CE)</option>
                        <option value="DF">Distrito Federal (DF)</option>
                        <option value="ES">Espírito Santo (ES)</option>
                        <option value="GO">Goiás (GO)</option>
                        <option value="MA">Maranhão (MA)</option>
                        <option value="MT">Mato Grosso (MT)</option>
                        <option value="MS">Mato Grosso do Sul (MS)</option>
                        <option value="MG">Minas Gerais (MG)</option>
                        <option value="PA">Pará (PA)</option>
                        <option value="PB">Paraíba (PB)</option>
                        <option value="PR">Paraná (PR)</option>
                        <option value="PE">Pernambuco (PE)</option>
                        <option value="PI">Piauí (PI)</option>
                        <option value="RJ">Rio de Janeiro (RJ)</option>
                        <option value="RN">Rio Grande do Norte (RN)</option>
                        <option value="RS">Rio Grande do Sul (RS)</option>
                        <option value="RO">Rondônia (RO)</option>
                        <option value="RR">Roraima (RR)</option>
                        <option value="SC">Santa Catarina (SC)</option>
                        <option value="SP">São Paulo (SP)</option>
                        <option value="SE">Sergipe (SE)</option>
                        <option value="TO">Tocantins (TO)</option>
                    </select>
                </div>
                <div class="full-width"><label>Distâncias Disponíveis</label><input type="text" id="distancias" required placeholder="Ex: 5k, 10k, 21k, 42k"></div>
                <div class="full-width"><label>Link de Inscrição Oficial</label><input type="url" id="link" required></div>`
        };

        async function buscarDadosDaNuvem() {
            const { data, error } = await _supabase.from(secaoAtiva).select('*').order('id', { ascending: false });
            if (error) {
                console.error(error);
                alert("Erro ao buscar dados da tabela: " + secaoAtiva + ". Verifique se desativou o RLS no Supabase.");
            } else {
                dadosLocais = data;
                renderizarLista();
            }
        }

        function alterarSecao(novaSecao, botao) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            botao.classList.add('active');
            secaoAtiva = novaSecao;
            resetForm();
            renderizarCampos();
            buscarDadosDaNuvem();
        }

        function renderizarCampos() {
            document.getElementById('campos-dinamicos').innerHTML = configuracaoCampos[secaoAtiva];
        }

        function renderizarLista() {
            const container = document.getElementById('lista-conteudos');
            container.innerHTML = '';
            
            if(dadosLocais.length === 0) {
                container.innerHTML = '<p style="font-size:13px; color:#64748b; text-align:center; padding:20px;">Nenhum conteúdo salvo na nuvem nesta seção.</p>';
                return;
            }

            dadosLocais.forEach(item => {
                const titulo = item.titulo || item.evento || `${item.modeloA} vs ${item.modeloB}`;
                
                // AJUSTADO: Monta a localização dinamicamente se for a tabela de corridas
                let sub = item.tag || item.confronto;
                if (secaoAtiva === 'corridas') {
                    sub = item.cidade && item.estado ? `${item.cidade} - ${item.estado}` : item.local;
                }

                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="item-info">
                        <h4>${titulo}</h4>
                        <p>${sub}</p>
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="carregarParaEdicao(${item.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="excluirItem(${item.id})"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
                container.appendChild(row);
            });
        }

        function carregarParaEdicao(id) {
            const item = dadosLocais.find(x => x.id === id);
            if(!item) return;

            document.getElementById('item-id').value = item.id;
            document.getElementById('form-titulo').innerText = "Editar Conteúdo Existente";
            document.getElementById('btn-cancelar').style.display = 'inline-block';

            Object.keys(item).forEach(key => {
                const el = document.getElementById(key);
                if(el) el.value = item[key];
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function salvarItem(e) {
            e.preventDefault();
            const id = document.getElementById('item-id').value;
            const item = {};

            const inputs = document.getElementById('campos-dinamicos').querySelectorAll('input, select, textarea');
            inputs.forEach(input => { item[input.id] = input.value; });

            let resposta;
            if (id) {
                resposta = await _supabase.from(secaoAtiva).update(item).eq('id', id);
            } else {
                resposta = await _supabase.from(secaoAtiva).insert([item]);
            }

            if (resposta.error) {
                alert("Erro operacional ao salvar no Supabase: " + resposta.error.message);
            } else {
                resetForm();
                buscarDadosDaNuvem();
            }
        }

        async function excluirItem(id) {
            if(!confirm("Tem certeza que deseja remover este registro da nuvem? O site principal atualizará na hora!")) return;

            const { error } = await _supabase.from(secaoAtiva).delete().eq('id', id);
            if (error) {
                alert("Erro ao remover do Supabase: " + error.message);
            } else {
                buscarDadosDaNuvem();
            }
        }

        function resetForm() {
            document.getElementById('form-gerenciador').reset();
            document.getElementById('item-id').value = '';
            document.getElementById('form-titulo').innerText = "Adicionar Item";
            document.getElementById('btn-cancelar').style.display = 'none';
        }

        window.onload = () => {
            renderizarCampos();
            buscarDadosDaNuvem();
        };
    </script>
</body>
</html>
